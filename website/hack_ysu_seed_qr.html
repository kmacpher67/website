<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code for Hack YSU Seed Page</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f9f9f9; }
        .qr-container { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 0 16px rgba(0,0,0,0.08); text-align: center; }
        h1 { color: #f00000; margin-bottom: 16px; }
        img { margin: 24px 0; }
        p { color: #333; }

        /* Print styles to fit on a single page */
        @media print {
            html, body {
                width: 100%;
                height: auto;
                margin: 0;
                padding: 0;
                background: #fff !important;
                box-sizing: border-box;
            }
            body {
                display: block;
                height: auto;
            }
            .qr-container {
                box-shadow: none;
                border-radius: 0;
                padding: 12px;
                margin: 0 auto;
                width: 100%;
                max-width: 600px;
            }
            h1 {
                font-size: 1.2em;
                margin-bottom: 8px;
            }
            img {
                max-width: 150px;
                max-height: 150px;
                margin: 12px 0;
            }
            p {
                font-size: 0.9em;
            }
            @page {
                size: A4 portrait;
                margin: 0.5in;
            }
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h1>Scan to Visit</h1>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https%3A%2F%2Fkenmacpherson.com%2Fhack_ysu_seed.html" alt="QR Code to Hack YSU Seed Page">
        <img src="startup-spark-hack-ysu-QR.png" alt="QR Code to Hack YSU Seed Page">
        <p>https://kenmacpherson.com/hack_ysu_seed.html</p>
    </div>
</body>
</html>

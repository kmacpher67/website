# Deploy KenMacPherson Website

name: Deploy KenMacPherson Website

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: detect deploy targets
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            mapfile -t changed_files < <(git diff --name-only HEAD~1 HEAD)
          else
            mapfile -t changed_files < <(git ls-files)
          fi

          declare -a site_dirs=()
          declare -A seen_site_dirs=()
          declare -a changed_confs=()
          root_index_changed=false
          root_nginx_changed=false

          for file in "${changed_files[@]}"; do
            case "$file" in
              index.html)
                root_index_changed=true
                ;;
              nginx.conf)
                root_nginx_changed=true
                ;;
              sites-available/*.conf)
                case "$file" in
                  sites-available/deprecated/*)
                    ;;
                  *)
                    changed_confs+=("$file")
                    ;;
                esac
                ;;
              */*)
                top_level="${file%%/*}"
                if [[ -d "$top_level" && -f "sites-available/$top_level.conf" && -z "${seen_site_dirs[$top_level]+x}" ]]; then
                  site_dirs+=("$top_level")
                  seen_site_dirs["$top_level"]=1
                fi
                ;;
            esac
          done

          {
            echo 'site_dirs<<EOF'
            printf '%s\n' "${site_dirs[@]}"
            echo 'EOF'
            echo 'changed_confs<<EOF'
            printf '%s\n' "${changed_confs[@]}"
            echo 'EOF'
            echo "root_index_changed=$root_index_changed"
            echo "root_nginx_changed=$root_nginx_changed"
            if (( ${#site_dirs[@]} > 0 )) || [ "$root_index_changed" = true ]; then
              echo "deploy_sites=true"
            else
              echo "deploy_sites=false"
            fi
            if (( ${#changed_confs[@]} > 0 )); then
              echo "deploy_confs=true"
            else
              echo "deploy_confs=false"
            fi
            if [ "$root_nginx_changed" = true ] || (( ${#changed_confs[@]} > 0 )); then
              echo "restart_nginx=true"
            else
              echo "restart_nginx=false"
            fi
          } >> "$GITHUB_OUTPUT"

          echo "changed site dirs:"
          if (( ${#site_dirs[@]} > 0 )); then
            printf '  %s\n' "${site_dirs[@]}"
          else
            echo "  <none>"
          fi
          echo "changed nginx confs:"
          if (( ${#changed_confs[@]} > 0 )); then
            printf '  %s\n' "${changed_confs[@]}"
          else
            echo "  <none>"
          fi
          echo "root index changed: $root_index_changed"
          echo "root nginx.conf changed: $root_nginx_changed"

      - name: upload changed site content
        if: steps.changes.outputs.deploy_sites == 'true'
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          KEY: ${{ secrets.KEY }}
          PORT: ${{ secrets.PORT }}
          DEPLOY_SITE_DIRS: ${{ steps.changes.outputs.site_dirs }}
          ROOT_INDEX_CHANGED: ${{ steps.changes.outputs.root_index_changed }}
        shell: bash
        run: |
          set -euo pipefail

          ssh_dir="$RUNNER_TEMP/ssh"
          mkdir -p "$ssh_dir"
          key_file="$ssh_dir/id_rsa"
          known_hosts="$ssh_dir/known_hosts"

          printf '%s\n' "$KEY" > "$key_file"
          chmod 600 "$key_file"
          ssh-keyscan -p "$PORT" -H "$HOST" > "$known_hosts"

          scp_opts=(-i "$key_file" -P "$PORT" -o UserKnownHostsFile="$known_hosts" -o StrictHostKeyChecking=yes)

          if [ "$ROOT_INDEX_CHANGED" = "true" ]; then
            scp "${scp_opts[@]}" index.html "${USERNAME}@${HOST}:/var/www/"
          fi

          while IFS= read -r site_dir; do
            [ -n "$site_dir" ] || continue
            scp "${scp_opts[@]}" -r "$site_dir" "${USERNAME}@${HOST}:/var/www/"
          done <<< "$DEPLOY_SITE_DIRS"

      - name: upload changed nginx config
        if: steps.changes.outputs.deploy_confs == 'true' || steps.changes.outputs.root_nginx_changed == 'true'
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          KEY: ${{ secrets.KEY }}
          PORT: ${{ secrets.PORT }}
          CHANGED_CONFS: ${{ steps.changes.outputs.changed_confs }}
          ROOT_NGINX_CHANGED: ${{ steps.changes.outputs.root_nginx_changed }}
        shell: bash
        run: |
          set -euo pipefail

          ssh_dir="$RUNNER_TEMP/ssh"
          mkdir -p "$ssh_dir"
          key_file="$ssh_dir/id_rsa"
          known_hosts="$ssh_dir/known_hosts"

          printf '%s\n' "$KEY" > "$key_file"
          chmod 600 "$key_file"
          ssh-keyscan -p "$PORT" -H "$HOST" > "$known_hosts"

          scp_opts=(-i "$key_file" -P "$PORT" -o UserKnownHostsFile="$known_hosts" -o StrictHostKeyChecking=yes)

          if [ "$ROOT_NGINX_CHANGED" = "true" ]; then
            scp "${scp_opts[@]}" nginx.conf "${USERNAME}@${HOST}:/etc/nginx/"
          fi

          while IFS= read -r conf; do
            [ -n "$conf" ] || continue
            scp "${scp_opts[@]}" "$conf" "${USERNAME}@${HOST}:/etc/nginx/sites-available/"
          done <<< "$CHANGED_CONFS"

      - name: validate and restart nginx
        if: steps.changes.outputs.restart_nginx == 'true'
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          KEY: ${{ secrets.KEY }}
          PORT: ${{ secrets.PORT }}
        shell: bash
        run: |
          set -euo pipefail

          ssh_dir="$RUNNER_TEMP/ssh"
          mkdir -p "$ssh_dir"
          key_file="$ssh_dir/id_rsa"
          known_hosts="$ssh_dir/known_hosts"

          printf '%s\n' "$KEY" > "$key_file"
          chmod 600 "$key_file"
          ssh-keyscan -p "$PORT" -H "$HOST" > "$known_hosts"

          ssh_opts=(-i "$key_file" -p "$PORT" -o UserKnownHostsFile="$known_hosts" -o StrictHostKeyChecking=yes)

          ssh "${ssh_opts[@]}" "${USERNAME}@${HOST}" bash -s <<'REMOTE'
          set -e
          mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
          for conf in /etc/nginx/sites-available/*.conf; do
            ln -sf "$conf" "/etc/nginx/sites-enabled/$(basename "$conf")"
          done
          nginx -t
          systemctl restart nginx
          echo "restarted nginx"
          ls -ltr /etc/nginx/sites-enabled/
          ls -ltr /etc/nginx/sites-available/
          REMOTE

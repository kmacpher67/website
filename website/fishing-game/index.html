<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Fishing Game — V5 Responsive</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1d21;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      touch-action: none;
      image-rendering: pixelated;
    }

    /* --- Touch controls --- */
    #touch-controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    #touch-controls.hidden {
      display: none;
    }
    .dpad {
      position: absolute;
      left: max(14px, env(safe-area-inset-left));
      bottom: max(14px, env(safe-area-inset-bottom));
      width: 168px;
      height: 168px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 4px;
      pointer-events: auto;
    }
    .dpad-btn {
      grid-column: 2;
      background: rgba(255,255,255,0.14);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .dpad-btn:active {
      background: rgba(255,255,255,0.32);
    }
    .dpad-btn.up { grid-row: 1; grid-column: 2; }
    .dpad-btn.left { grid-row: 2; grid-column: 1; }
    .dpad-btn.right { grid-row: 2; grid-column: 3; }
    .dpad-btn.down { grid-row: 3; grid-column: 2; }

    .action-buttons {
      position: absolute;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: auto;
    }
    .action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.16);
      color: #fff;
      font: bold 14px monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .action-btn:active {
      background: rgba(255,255,255,0.34);
    }
    #btn-esc {
      width: 48px;
      height: 48px;
      font-size: 12px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="shell">
    <canvas id="game"></canvas>
    <div id="touch-controls" class="hidden">
      <div class="dpad">
        <button class="dpad-btn up" data-dir="w">▲</button>
        <button class="dpad-btn left" data-dir="a">◀</button>
        <button class="dpad-btn right" data-dir="d">▶</button>
        <button class="dpad-btn down" data-dir="s">▼</button>
      </div>
      <div class="action-buttons">
        <button id="btn-esc" class="action-btn">✕ BACK</button>
        <button id="btn-f" class="action-btn">CAST</button>
        <button id="btn-e" class="action-btn">USE</button>
      </div>
    </div>
  </div>
  <script src="game.js?v=1784410348"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Fishing Game — V5 Responsive</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1d21;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      touch-action: none;
      image-rendering: pixelated;
    }

    /* --- Touch controls --- */
    #touch-controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    #touch-controls.hidden {
      display: none;
    }
    .dpad {
      position: absolute;
      left: max(14px, env(safe-area-inset-left));
      bottom: max(14px, env(safe-area-inset-bottom));
      width: 168px;
      height: 168px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 4px;
      pointer-events: auto;
    }
    .dpad-btn {
      grid-column: 2;
      background: linear-gradient(180deg, rgba(38,50,42,0.9), rgba(16,24,20,0.9));
      border: 1.5px solid rgba(198,168,110,0.5);
      border-radius: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 2px 4px rgba(0,0,0,0.4);
      color: #eee6d6;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .dpad-btn:active {
      background: linear-gradient(180deg, rgba(58,74,62,0.95), rgba(24,34,28,0.95));
      border-color: rgba(216,180,106,0.85);
    }
    .dpad-btn.up { grid-row: 1; grid-column: 2; }
    .dpad-btn.left { grid-row: 2; grid-column: 1; }
    .dpad-btn.right { grid-row: 2; grid-column: 3; }
    .dpad-btn.down { grid-row: 3; grid-column: 2; }

    .action-buttons {
      position: absolute;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: auto;
    }
    .action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1.5px solid rgba(198,168,110,0.55);
      background: radial-gradient(circle at 35% 30%, rgba(52,66,56,0.95), rgba(14,20,17,0.95));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 2px 5px rgba(0,0,0,0.45);
      color: #eee6d6;
      font: bold 13px monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .action-btn:active {
      border-color: rgba(216,180,106,0.9);
      background: radial-gradient(circle at 35% 30%, rgba(70,86,74,0.95), rgba(22,30,25,0.95));
    }
    #btn-esc {
      width: 48px;
      height: 48px;
      font-size: 11px;
      opacity: 0.85;
    }
    #btn-f {
      border-color: rgba(216,180,106,0.8);
    }
  </style>
</head>
<body>
  <div id="shell">
    <canvas id="game"></canvas>
    <div id="touch-controls" class="hidden">
      <div class="dpad">
        <button class="dpad-btn up" data-dir="w">▲</button>
        <button class="dpad-btn left" data-dir="a">◀</button>
        <button class="dpad-btn right" data-dir="d">▶</button>
        <button class="dpad-btn down" data-dir="s">▼</button>
      </div>
      <div class="action-buttons">
        <button id="btn-esc" class="action-btn">✕ BACK</button>
        <button id="btn-f" class="action-btn">CAST</button>
        <button id="btn-e" class="action-btn">USE</button>
      </div>
    </div>
  </div>
  <script src="game.js?v=1784430964"></script>
</body>
</html>

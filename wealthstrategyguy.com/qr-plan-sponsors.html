<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W3NEWW4DF7"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-W3NEWW4DF7');

        // Fire QR scan event, then redirect
        gtag('event', 'qr_scan', {
            event_category: 'QR Code',
            event_label: 'Plan Sponsors Page',
            value: 1
        });

        // Redirect after a short delay to allow GA to fire
        setTimeout(function () {
            window.location.replace('https://wealthstrategyguy.com/plan-sponsors.html');
        }, 800);
    </script>

    <style>
        body {
            margin: 0;
            font-family: 'Lato', sans-serif;
            background-color: #0d2c56;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            text-align: center;
        }
        .message {
            opacity: 0;
            animation: fadeIn 0.4s ease-in 0.1s forwards;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid rgba(201, 162, 39, 0.3);
            border-top-color: #c9a227;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { to { opacity: 1; } }
        p { margin: 0; font-size: 1rem; color: #c9a227; }
    </style>
</head>
<body>
    <div class="message">
        <div class="spinner"></div>
        <p>Taking you there now...</p>
    </div>
</body>
</html>
